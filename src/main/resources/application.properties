spring.application.name=payment-service
server.port=${PORT:8084}
server.servlet.context-path=/api/v1

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/grainflow_payment}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Internal service URLs
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}

# Frontend URL (for Stripe checkout success/cancel redirect)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_replace_me}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_replace_me}
stripe.price-id=${STRIPE_PRICE_ID:price_replace_me}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Actuator
management.endpoints.web.exposure.include=health,info
